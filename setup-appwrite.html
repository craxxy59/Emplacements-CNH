<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installateur Appwrite - CNH Marina</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 600px; }
        h1 { color: #f042a1; }
        #log { text-align: left; background: #1e1e1e; color: #00ff00; padding: 1rem; border-radius: 8px; height: 350px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 1rem; white-space: pre-wrap; }
        button { background: #f042a1; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background: #ccc; }
        .success { color: #00ff00; font-weight: bold; }
        .error { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Setup Appwrite CNH (v2)</h1>
        <p>Ce script utilise l'API REST pour configurer ton projet.</p>
        <button id="startBtn">Lancer l'installation</button>
        <div id="log">En attente du lancement...<br></div>
    </div>

    <script>
        const CONFIG = {
            endpoint: 'https://cloud.appwrite.io/v1',
            projectId: '6a2fbdf0001acfc98111',
            apiKey: 'standard_a53b4103bd791c96bba00d900f59e5dade2d25be6fc4f61c2f3d7b334d6c2e34393d8874ee6f021543c29d55bb32a9f917a6b466519ac9fcc29eddc3d7885ef5805f82775375a77ffc8eecd554675cc79ce11b4c754b6a429ece2d5bd00cf52560055f07385aec72f6a7bd0bcfe6b58b543f700915c02c7a68c68cfbf06d3cad'
        };

        const logEl = document.getElementById('log');
        const btn = document.getElementById('startBtn');

        function log(msg, type = '') {
            const span = document.createElement('span');
            span.className = type;
            span.innerHTML = `> ${msg}<br>`;
            logEl.appendChild(span);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function apiRequest(method, path, body = null) {
            const response = await fetch(`${CONFIG.endpoint}${path}`, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-Appwrite-Project': CONFIG.projectId,
                    'X-Appwrite-Key': CONFIG.apiKey
                },
                body: body ? JSON.stringify(body) : null
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message || 'Erreur API');
            return data;
        }

        async function setup() {
            btn.disabled = true;
            log('Démarrage de l\'installation...');

            try {
                // 1. Database
                log('Création de la base de données CNH_Marina...');
                const db = await apiRequest('POST', '/databases', {
                    databaseId: 'cnh_db',
                    name: 'CNH_Marina'
                });
                const dbId = db.$id;
                log(`Base créée avec ID: ${dbId}`, 'success');

                // 2. Collection Bateaux
                log('Création de la collection "boats"...');
                const boatsCol = await apiRequest('POST', `/databases/${dbId}/collections`, {
                    collectionId: 'boats_col',
                    name: 'boats',
                    permissions: 'users:all' 
                });
                const boatsId = boatsCol.$id;
                log(`Collection boats créée avec ID: ${boatsId}`, 'success');

                // 3. Attributs Bateaux
                const boatAttrs = [
                    { name: 'boat_name', type: 'string', size: 255, required: true },
                    { name: 'licence_number', type: 'string', size: 255, required: true },
                    { name: 'registration_number', type: 'string', size: 255, required: false },
                    { name: 'boat_type', type: 'string', size: 255, required: false },
                    { name: 'status', type: 'string', size: 255, required: true },
                    { name: 'owner_name', type: 'string', size: 255, required: true },
                    { name: 'owner_phone', type: 'string', size: 255, required: true },
                    { name: 'owner_email', type: 'string', size: 255, required: false },
                    { name: 'emergency_contact', type: 'string', size: 255, required: false },
                    { name: 'zone_id', type: 'string', size: 255, required: true },
                    { name: 'slot_number', type: 'integer', required: true },
                    { name: 'length_m', type: 'string', size: 255, required: false },
                    { name: 'width_m', type: 'string', size: 255, required: false },
                    { name: 'equipment', type: 'string', size: 255, required: false },
                    { name: 'notes', type: 'string', size: 255, required: false },
                    { name: 'photo_data', type: 'string', size: 10000, required: false },
                ];

                for (const attr of boatAttrs) {
                    log(`Ajout de l'attribut ${attr.name}...`);
                    await apiRequest('POST', `/databases/${dbId}/collections/${boatsId}/attributes`, {
                        key: attr.name,
                        type: attr.type,
                        size: attr.size || 255,
                        required: attr.required
                    });
                }
                log('Tous les attributs de bateaux ont été créés !', 'success');

                // 4. Collection Profils
                log('Création de la collection "profiles"...');
                const profCol = await apiRequest('POST', `/databases/${dbId}/collections`, {
                    collectionId: 'profiles_col',
                    name: 'profiles',
                    permissions: 'users:all'
                });
                const profId = profCol.$id;
                
                const profAttrs = [
                    { name: 'email', type: 'string', size: 255, required: true },
                    { name: 'full_name', type: 'string', size: 255, required: false },
                    { name: 'role', type: 'string', size: 255, required: true },
                    { name: 'must_change_password', type: 'boolean', required: true },
                ];

                for (const attr of profAttrs) {
                    log(`Ajout de l'attribut ${attr.name}...`);
                    await apiRequest('POST', `/databases/${dbId}/collections/${profId}/attributes`, {
                        key: attr.name,
                        type: attr.type,
                        size: attr.size || 255,
                        required: attr.required
                    });
                }
                log('Tous les attributs de profils ont été créés !', 'success');

                log('\n--- INSTALLATION TERMINÉE AVEC SUCCÈS ---', 'success');
                log('Tu peux maintenant fermer cette page et me prévenir.');

            } catch (e) {
                log('ERREUR : ' + e.message, 'error');
                console.error(e);
            }
        }

        btn.onclick = setup;
    </script>
</body>
</html>
